- name: app setup
  include_role:
     name: common #this is common directory
     tasks_from: app-setup 
- name: app setup
  include_role:
    name: common #this is common directory
    tasks_from: nodejs



- name: copy mongodb repo
  ansible.builtin.copy:
    src: mongo.repo #src means source
    dest: /etc/yum.repos.d/mongo.repo #dest means destinati

- name: install mongodb client
  ansible.builtin.dnf:
    name: mongodb-mongosh
    state: present

- name: check products loaded or not
  ansible.builtin.command: mongosh --host mongodb.banasurekha.shop --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
  register: catalogue_output
  ignore_errors: true
  ignore_unreachable: true

- name: print catalogue output
  ansible.builtin.debug:
    msg: "{{ catalogue_output }}"
  ignore_errors: true
  ignore_unreachable: true
  
- name: load products
  ansible.builtin.shell: mongosh --host mongodb.banasurekha.shop < /app/db/master-data.js
  when: catalogue_output.stdout | int < 0
  ignore_errors: true
  ignore_unreachable: true
  
- name: systemd setup
  include_role:
     name: common #this is common directory
     tasks_from: systemd.yaml
- name: Deployment
  # tags:
  # - deployment
  import_role:
     name: common #this is common directory
     tasks_from: deployment

